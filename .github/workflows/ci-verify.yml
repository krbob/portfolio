name: CI Verify

on:
  workflow_call:

env:
  JDK_VERSION: "21"
  NODE_VERSION: "24"

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run API tests
        working-directory: apps/api
        run: ./gradlew test

  web:
    name: Web tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint web app
        working-directory: apps/web
        run: npm run lint

      - name: Run web tests
        working-directory: apps/web
        run: npm test

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Regenerate API client
        working-directory: apps/web
        run: npm run generate:api

      - name: Verify generated API client is committed
        run: git diff --exit-code -- apps/web/src/api/generated/portfolio-api.d.ts

  smoke-sqlite-docker:
    name: SQLite Docker smoke
    runs-on: ubuntu-latest
    needs:
      - api
      - web
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run SQLite Docker smoke test
        run: ./scripts/smoke-test-sqlite-stack.sh

  smoke-web-docker:
    name: Web Docker smokes
    runs-on: ubuntu-latest
    needs:
      - api
      - web
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run browser E2E smoke test
        run: ./scripts/smoke-test-browser-stack.sh

      - name: Run auth Docker smoke test
        run: ./scripts/smoke-test-auth-stack.sh

      - name: Upload web smoke traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: web-smoke-test-results
          path: apps/web/test-results
          if-no-files-found: ignore
