name: Live market-data canary

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yahoo-gus:
    name: Yahoo and GUS canary
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run live upstream canary
        env:
          PORTFOLIO_STOCK_ANALYST_API_URL: ${{ secrets.LIVE_STOCK_ANALYST_API_URL || 'https://stock.bobinski.net/api' }}
          PORTFOLIO_EDO_CALCULATOR_API_URL: ${{ secrets.LIVE_EDO_CALCULATOR_API_URL || 'https://edo.bobinski.net' }}
        run: ./scripts/live-market-data-canary.sh
