name: CI Test

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/ci-verify.yml

  smoke-self-hosted-market-data-docker:
    name: Self-hosted market-data smoke
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run self-hosted market-data smoke test
        run: sh ./scripts/smoke-test-self-hosted-market-data-stack.sh
