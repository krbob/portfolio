name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run API tests
        working-directory: apps/api
        run: ./gradlew test

  web:
    name: Web tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run web tests
        working-directory: apps/web
        run: npm test

      - name: Build web app
        working-directory: apps/web
        run: npm run build

  smoke-sqlite-docker:
    name: SQLite Docker smoke
    runs-on: ubuntu-latest
    needs:
      - api
      - web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run SQLite Docker smoke test
        run: ./scripts/smoke-test-sqlite-stack.sh
