ktor:
  application:
    modules:
      - net.bobinski.portfolio.api.ApplicationKt.module
  deployment:
    port: 18082

portfolio:
  name: "Portfolio"
  stage: "test"
  openapi:
    uiEnabled: false
  persistence:
    databasePath: "./build/test-data/portfolio.db"
    journalMode: "WAL"
    synchronousMode: "FULL"
    busyTimeoutMs: 5000
  backups:
    enabled: false
    directory: "./build/test-backups"
    intervalMinutes: 1440
    retentionCount: 30
  auth:
    enabled: false
    password: ""
    sessionSecret: ""
    sessionCookieName: "portfolio_session"
    secureCookie: false
    sessionMaxAgeDays: 30
  marketData:
    enabled: true
    stockAnalystBaseUrl: "http://127.0.0.1:18080"
    edoCalculatorBaseUrl: "http://127.0.0.1:18081"
    usdPlnSymbol: "USDPLN=X"
    goldBenchmarkSymbol: "GC=F"
    equityBenchmarkSymbol: "VWRA.L"
    bondBenchmarkSymbol: "VAGF.DE"
