ktor:
  application:
    modules:
      - net.bobinski.portfolio.api.ApplicationKt.module
  deployment:
    port: 18082

portfolio:
  name: "Portfolio"
  stage: "dev"
  openapi:
    uiEnabled: false
  persistence:
    databasePath: "./data/portfolio.db"
    journalMode: "WAL"
    synchronousMode: "FULL"
    busyTimeoutMs: 5000
  backups:
    enabled: false
    directory: "./data/backups"
    intervalMinutes: 1440
    retentionCount: 30
  readModelRefresh:
    enabled: false
    intervalMinutes: 720
    runOnStart: true
  auth:
    enabled: false
    password: ""
    sessionSecret: ""
    sessionCookieName: "portfolio_session"
    secureCookie: false
    sessionMaxAgeDays: 30
  marketData:
    enabled: false
    stockAnalystBaseUrl: "http://127.0.0.1:18080"
    edoCalculatorBaseUrl: "http://127.0.0.1:18081"
    usdPlnSymbol: "PLN=X"
    goldBenchmarkSymbol: "GC=F"
    equityBenchmarkSymbol: "VWRA.L"
    bondBenchmarkSymbol: "ETFBTBSP.WA"
