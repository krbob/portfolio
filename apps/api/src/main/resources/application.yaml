ktor:
  application:
    modules:
      - net.bobinski.portfolio.api.ApplicationKt.module
  deployment:
    port: 18082

portfolio:
  name: "Portfolio"
  stage: "dev"
  persistence:
    mode: "memory"
    jdbcUrl: "jdbc:postgresql://127.0.0.1:15432/portfolio"
    username: "portfolio"
    password: "portfolio"
  backups:
    enabled: false
    directory: "./data/backups"
    intervalMinutes: 1440
    retentionCount: 30
  auth:
    enabled: false
    password: ""
    sessionSecret: ""
    sessionCookieName: "portfolio_session"
    secureCookie: false
    sessionMaxAgeDays: 30
  marketData:
    enabled: true
    stockAnalystBaseUrl: "http://127.0.0.1:18080"
    edoCalculatorBaseUrl: "http://127.0.0.1:18081"
    usdPlnSymbol: "USDPLN=X"
    goldBenchmarkSymbol: "XAUUSD=X"
    equityBenchmarkSymbol: "VWRA.L"
