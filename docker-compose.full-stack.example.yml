services:
  portfolio-api:
    image: ghcr.io/krbob/portfolio-api:latest
    environment:
      PORTFOLIO_DATABASE_PATH: /srv/portfolio/data/portfolio.db
      PORTFOLIO_JOURNAL_MODE: WAL
      PORTFOLIO_SYNCHRONOUS_MODE: FULL
      PORTFOLIO_BUSY_TIMEOUT_MS: 5000
      PORTFOLIO_MARKET_DATA_ENABLED: "true"
      PORTFOLIO_STOCK_ANALYST_BASE_URL: http://stock-analyst:8080
      PORTFOLIO_EDO_CALCULATOR_BASE_URL: http://edo-calculator:8080
      PORTFOLIO_GOLD_API_BASE_URL: https://api.gold-api.com
      PORTFOLIO_GOLD_API_KEY: ${PORTFOLIO_GOLD_API_KEY:-}
      PORTFOLIO_BACKUPS_ENABLED: "true"
      PORTFOLIO_BACKUPS_DIRECTORY: /srv/portfolio/backups
      PORTFOLIO_BACKUPS_INTERVAL_MINUTES: 1440
      PORTFOLIO_BACKUPS_RETENTION_COUNT: 30
      PORTFOLIO_READ_MODEL_REFRESH_ENABLED: "true"
      PORTFOLIO_READ_MODEL_REFRESH_INTERVAL_MINUTES: 720
      PORTFOLIO_READ_MODEL_REFRESH_RUN_ON_START: "true"
      PORTFOLIO_AUTH_ENABLED: ${PORTFOLIO_AUTH_ENABLED:-false}
      PORTFOLIO_AUTH_PASSWORD: ${PORTFOLIO_AUTH_PASSWORD:-}
      PORTFOLIO_AUTH_SESSION_SECRET: ${PORTFOLIO_AUTH_SESSION_SECRET:-}
      PORTFOLIO_AUTH_SECURE_COOKIE: ${PORTFOLIO_AUTH_SECURE_COOKIE:-false}
    depends_on:
      - stock-analyst
      - edo-calculator
    ports:
      - "18082:18082"
    volumes:
      - portfolio-sqlite-data:/srv/portfolio/data
      - portfolio-backup-data:/srv/portfolio/backups
    restart: unless-stopped

  portfolio-web:
    image: ghcr.io/krbob/portfolio-web:latest
    depends_on:
      - portfolio-api
    environment:
      VITE_API_PROXY_TARGET: http://portfolio-api:18082
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
    ports:
      - "4174:4174"
    restart: unless-stopped

  stock-analyst:
    image: ghcr.io/krbob/stock-analyst:main
    depends_on:
      - stock-analyst-backend-yfinance
    environment:
      BACKEND_URL: http://stock-analyst-backend-yfinance:8081
    restart: unless-stopped

  stock-analyst-backend-yfinance:
    image: ghcr.io/krbob/stock-analyst-backend-yfinance:main
    restart: unless-stopped

  edo-calculator:
    image: ghcr.io/krbob/edo-calculator:latest
    restart: unless-stopped

volumes:
  portfolio-sqlite-data:
  portfolio-backup-data:
