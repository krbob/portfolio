services:
  portfolio-postgres:
    profiles: ["postgres-legacy"]
    image: postgres:17-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "15432:5432"
    volumes:
      - portfolio-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  portfolio-api:
    profiles: ["app"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: portfolio-api
    environment:
      PORTFOLIO_PERSISTENCE_MODE: sqlite
      PORTFOLIO_SQLITE_DATABASE_PATH: "${PORTFOLIO_SQLITE_DATABASE_PATH:-/srv/portfolio/data/portfolio.db}"
      PORTFOLIO_SQLITE_JOURNAL_MODE: "${PORTFOLIO_SQLITE_JOURNAL_MODE:-WAL}"
      PORTFOLIO_SQLITE_SYNCHRONOUS_MODE: "${PORTFOLIO_SQLITE_SYNCHRONOUS_MODE:-FULL}"
      PORTFOLIO_SQLITE_BUSY_TIMEOUT_MS: "${PORTFOLIO_SQLITE_BUSY_TIMEOUT_MS:-5000}"
      PORTFOLIO_MARKET_DATA_ENABLED: "${PORTFOLIO_MARKET_DATA_ENABLED:-false}"
      PORTFOLIO_STOCK_ANALYST_BASE_URL: "${PORTFOLIO_STOCK_ANALYST_BASE_URL:-http://127.0.0.1:18080}"
      PORTFOLIO_EDO_CALCULATOR_BASE_URL: "${PORTFOLIO_EDO_CALCULATOR_BASE_URL:-http://127.0.0.1:18081}"
      PORTFOLIO_BACKUPS_ENABLED: "${PORTFOLIO_BACKUPS_ENABLED:-true}"
      PORTFOLIO_BACKUPS_DIRECTORY: "${PORTFOLIO_BACKUPS_DIRECTORY:-/srv/portfolio/backups}"
      PORTFOLIO_BACKUPS_INTERVAL_MINUTES: "${PORTFOLIO_BACKUPS_INTERVAL_MINUTES:-1440}"
      PORTFOLIO_BACKUPS_RETENTION_COUNT: "${PORTFOLIO_BACKUPS_RETENTION_COUNT:-30}"
    ports:
      - "18082:18082"
    volumes:
      - portfolio-sqlite-data:/srv/portfolio/data
      - portfolio-backup-data:${PORTFOLIO_BACKUPS_DIRECTORY:-/srv/portfolio/backups}
    restart: unless-stopped

  portfolio-web:
    profiles: ["app"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: portfolio-web
    environment:
      VITE_API_PROXY_TARGET: "${PORTFOLIO_WEB_API_PROXY_TARGET:-http://portfolio-api:18082}"
    depends_on:
      - portfolio-api
    ports:
      - "4174:4174"
    restart: unless-stopped

volumes:
  portfolio-postgres-data:
  portfolio-sqlite-data:
  portfolio-backup-data:
