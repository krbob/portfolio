services:
  portfolio-api:
    profiles: ["app"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      PORTFOLIO_DATABASE_PATH: "${PORTFOLIO_DATABASE_PATH:-/srv/portfolio/data/portfolio.db}"
      PORTFOLIO_JOURNAL_MODE: "${PORTFOLIO_JOURNAL_MODE:-WAL}"
      PORTFOLIO_SYNCHRONOUS_MODE: "${PORTFOLIO_SYNCHRONOUS_MODE:-FULL}"
      PORTFOLIO_BUSY_TIMEOUT_MS: "${PORTFOLIO_BUSY_TIMEOUT_MS:-5000}"
      PORTFOLIO_MARKET_DATA_ENABLED: "${PORTFOLIO_MARKET_DATA_ENABLED:-false}"
      PORTFOLIO_STOCK_ANALYST_API_URL: "${PORTFOLIO_STOCK_ANALYST_API_URL:-http://127.0.0.1:18080}"
      PORTFOLIO_STOCK_ANALYST_UI_URL: "${PORTFOLIO_STOCK_ANALYST_UI_URL:-}"
      PORTFOLIO_EDO_CALCULATOR_API_URL: "${PORTFOLIO_EDO_CALCULATOR_API_URL:-http://127.0.0.1:18081}"
      PORTFOLIO_GOLD_API_URL: "${PORTFOLIO_GOLD_API_URL:-https://api.gold-api.com}"
      PORTFOLIO_GOLD_API_KEY: "${PORTFOLIO_GOLD_API_KEY:-}"
      PORTFOLIO_BACKUPS_ENABLED: "${PORTFOLIO_BACKUPS_ENABLED:-true}"
      PORTFOLIO_BACKUPS_DIRECTORY: "${PORTFOLIO_BACKUPS_DIRECTORY:-/srv/portfolio/backups}"
      PORTFOLIO_BACKUPS_INTERVAL_MINUTES: "${PORTFOLIO_BACKUPS_INTERVAL_MINUTES:-1440}"
      PORTFOLIO_BACKUPS_RETENTION_COUNT: "${PORTFOLIO_BACKUPS_RETENTION_COUNT:-30}"
      PORTFOLIO_READ_MODEL_REFRESH_ENABLED: "${PORTFOLIO_READ_MODEL_REFRESH_ENABLED:-false}"
      PORTFOLIO_READ_MODEL_REFRESH_INTERVAL_MINUTES: "${PORTFOLIO_READ_MODEL_REFRESH_INTERVAL_MINUTES:-720}"
      PORTFOLIO_READ_MODEL_REFRESH_RUN_ON_START: "${PORTFOLIO_READ_MODEL_REFRESH_RUN_ON_START:-true}"
      PORTFOLIO_OPENAPI_UI_ENABLED: "${PORTFOLIO_OPENAPI_UI_ENABLED:-false}"
      PORTFOLIO_AUTH_ENABLED: "${PORTFOLIO_AUTH_ENABLED:-false}"
      PORTFOLIO_AUTH_PASSWORD: "${PORTFOLIO_AUTH_PASSWORD:-}"
      PORTFOLIO_AUTH_SESSION_SECRET: "${PORTFOLIO_AUTH_SESSION_SECRET:-}"
      PORTFOLIO_AUTH_SECURE_COOKIE: "${PORTFOLIO_AUTH_SECURE_COOKIE:-true}"
    ports:
      - "${PORTFOLIO_API_PORT:-18082}:18082"
    volumes:
      - portfolio-sqlite-data:/srv/portfolio/data
      - portfolio-backup-data:${PORTFOLIO_BACKUPS_DIRECTORY:-/srv/portfolio/backups}
    restart: unless-stopped

  portfolio-web:
    profiles: ["app"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      PORTFOLIO_API_UPSTREAM: "${PORTFOLIO_WEB_API_UPSTREAM:-http://portfolio-api:18082}"
    depends_on:
      - portfolio-api
    ports:
      - "${PORTFOLIO_WEB_PORT:-4174}:4174"
    restart: unless-stopped

volumes:
  portfolio-sqlite-data:
  portfolio-backup-data:
