services:
  portfolio-api:
    environment:
      PORTFOLIO_MARKET_DATA_ENABLED: "true"
      PORTFOLIO_STOCK_ANALYST_API_URL: "http://stock-analyst:8080"
      PORTFOLIO_EDO_CALCULATOR_API_URL: "http://edo-calculator:8080"
    depends_on:
      - stock-analyst
      - edo-calculator

  stock-analyst:
    image: ghcr.io/krbob/stock-analyst:main
    platform: ${PORTFOLIO_MARKET_DATA_PLATFORM:-linux/amd64}
    depends_on:
      - stock-analyst-backend-yfinance
    environment:
      BACKEND_URL: "http://stock-analyst-backend-yfinance:8081"
    restart: unless-stopped

  stock-analyst-backend-yfinance:
    image: ghcr.io/krbob/stock-analyst-backend-yfinance:main
    platform: ${PORTFOLIO_MARKET_DATA_PLATFORM:-linux/amd64}
    restart: unless-stopped

  edo-calculator:
    image: ghcr.io/krbob/edo-calculator:latest
    platform: ${PORTFOLIO_MARKET_DATA_PLATFORM:-linux/amd64}
    restart: unless-stopped
